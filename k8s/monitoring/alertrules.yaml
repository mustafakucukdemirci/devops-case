apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mern-app-alerts
  namespace: mern-app
  labels:
    # These labels must match prometheusSpec.ruleSelector in the Helm values
    release: kube-prometheus-stack
spec:
  groups:
    - name: mern-app.availability
      interval: 30s
      rules:

        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="mern-app"}[5m]) * 60 > 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"
            description: "Container {{ $labels.container }} restarted more than once per minute for 2 minutes."

        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas{namespace="mern-app"}
              != kube_deployment_status_available_replicas{namespace="mern-app"}
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.deployment }} has unavailable replicas"
            description: "Expected {{ $value }} replicas but fewer are available for 5 minutes."

        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{namespace="mern-app", condition="true"} == 0
          for: 3m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} not ready"
            description: "Pod has been in a non-ready state for more than 3 minutes."

    - name: mern-app.resources
      interval: 60s
      rules:

        - alert: HighCPUUsage
          expr: |
            rate(container_cpu_usage_seconds_total{namespace="mern-app", container!=""}[5m])
              / on(pod, container) kube_pod_container_resource_limits{resource="cpu", namespace="mern-app"}
              * 100 > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High CPU on {{ $labels.pod }}/{{ $labels.container }}"
            description: "CPU usage is above 85% of the limit for 5 minutes. HPA should have scaled — check max replicas."

        - alert: HighMemoryUsage
          expr: |
            container_memory_working_set_bytes{namespace="mern-app", container!=""}
              / on(pod, container) kube_pod_container_resource_limits{resource="memory", namespace="mern-app"}
              * 100 > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High memory on {{ $labels.pod }}/{{ $labels.container }}"
            description: "Memory usage is above 85% of the limit for 5 minutes."

    - name: mern-app.jobs
      rules:

        - alert: ETLJobFailed
          expr: |
            kube_job_status_failed{namespace="mern-app", job_name=~"python-etl-.*"} > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "ETL job {{ $labels.job_name }} failed"
            description: "Python ETL CronJob failed. Check pod logs: kubectl logs -n mern-app -l job-name={{ $labels.job_name }}"

        - alert: ETLJobMissed
          # Fires if no successful ETL completion in the last 90 minutes (schedule is hourly)
          expr: |
            time() - kube_job_status_completion_time{namespace="mern-app", job_name=~"python-etl-.*"} > 5400
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "ETL job has not completed successfully in 90 minutes"
            description: "Expected hourly execution. Last successful completion was {{ $value | humanizeDuration }} ago."
