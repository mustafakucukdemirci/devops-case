apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: mern-app
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [mongodb]
                topologyKey: kubernetes.io/hostname

      # mongo:7.0 runs as mongodb (UID 999) — fsGroup ensures /data/db is writable
      securityContext:
        fsGroup: 999
        runAsGroup: 999
        runAsUser: 999
        runAsNonRoot: true

      containers:
        - name: mongodb
          image: mongo:7.0
          ports:
            - containerPort: 27017

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # MongoDB writes to /data/db and /tmp
            capabilities:
              drop: ["ALL"]

          env:
            - name: MONGO_INITDB_DATABASE
              value: sample_training
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_PASSWORD

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  mongosh --username "$MONGO_INITDB_ROOT_USERNAME" \
                          --password "$MONGO_INITDB_ROOT_PASSWORD" \
                          --quiet --eval "db.adminCommand('ping').ok"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  mongosh --username "$MONGO_INITDB_ROOT_USERNAME" \
                          --password "$MONGO_INITDB_ROOT_PASSWORD" \
                          --quiet --eval "db.adminCommand('ping').ok"
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3

          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db

  volumeClaimTemplates:
    - metadata:
        name: mongo-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 10Gi
