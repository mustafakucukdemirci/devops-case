apiVersion: batch/v1
kind: CronJob
metadata:
  name: python-etl
  namespace: mern-app
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3300
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure

          # Matches appuser UID created in the Dockerfile
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            seccompProfile:
              type: RuntimeDefault

          containers:
            - name: python-etl
              image: ${ECR_REGISTRY}/python-etl:${IMAGE_TAG}
              imagePullPolicy: Always

              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]

              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "256Mi"
