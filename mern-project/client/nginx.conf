upstream api {
    # Kubernetes service name — must match metadata.name in server/service.yaml
    server server:5050;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Bağlantı zaman aşımları
    keepalive_timeout 65;
    keepalive_requests 1000;

    # Buffer ayarları — yüksek trafik için
    client_body_buffer_size     128k;
    client_max_body_size        10m;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 4k;

    # API traffic — proxy to Express service; browser hardcodes localhost:5050
    # so we intercept at nginx level instead of touching React source
    location ~ ^/(record|healthcheck) {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # React Router: tüm route'ları index.html'e yönlendir
    location / {
        try_files $uri $uri/ /index.html;

        # Statik HTML — cache'leme
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # JS/CSS/img — agresif cache (build hash'i değişince otomatik bozulur)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Sıkıştırma
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml;

    # Güvenlik header'ları
    add_header X-Frame-Options "SAMEORIGIN"          always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection "1; mode=block"      always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
