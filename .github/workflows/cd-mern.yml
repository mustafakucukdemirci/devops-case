name: MERN CD

on:
  push:
    branches:
      - main
    paths:
      - "mern-project/**"
      - "k8s/mongodb/**"
      - "k8s/server/**"
      - "k8s/client/**"
      - "k8s/namespace.yaml"
      - ".github/workflows/cd-mern.yml"

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Commit SHA ensures every deploy is uniquely tagged and traceable in ECR
      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Build and push server
        run: |
          docker build -t $ECR_REGISTRY/mern-server:$IMAGE_TAG mern-project/server
          docker push $ECR_REGISTRY/mern-server:$IMAGE_TAG

      - name: Build and push client
        run: |
          docker build \
            --build-arg REACT_APP_API_URL="" \
            -t $ECR_REGISTRY/mern-client:$IMAGE_TAG \
            mern-project/client
          docker push $ECR_REGISTRY/mern-client:$IMAGE_TAG

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

      # envsubst replaces ${ECR_REGISTRY} and ${IMAGE_TAG} in deployment manifests
      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s/namespace.yaml

          for manifest in k8s/mongodb k8s/server k8s/client; do
            for file in $manifest/*.yaml; do
              envsubst < "$file" | kubectl apply -f -
            done
          done

      - name: Apply alert rules
        run: kubectl apply -f k8s/monitoring/alertrules.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/server -n mern-app --timeout=120s
          kubectl rollout status deployment/client -n mern-app --timeout=120s
