name: MERN CD

on:
  push:
    branches:
      - main
    paths:
      - "mern-project/**"
      - "k8s/mongodb/**"
      - "k8s/server/**"
      - "k8s/client/**"
      - "k8s/namespace.yaml"
      - ".github/workflows/cd-mern.yml"

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.adminCommand('ping').ok\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: mern-project/server/package-lock.json

      - name: Install dependencies
        working-directory: mern-project/server
        run: npm ci

      - name: Run server tests
        working-directory: mern-project/server
        env:
          ATLAS_URI: mongodb://localhost:27017/sample_training_test
          NODE_ENV: test
        run: npm test

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: mern-project/client/package-lock.json

      - name: Install client dependencies
        working-directory: mern-project/client
        run: npm ci

      - name: Client build check
        working-directory: mern-project/client
        env:
          REACT_APP_API_URL: ""
        run: npm run build

  deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest
    needs: test  # deploy starts only if test job passes

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Commit SHA ensures every deploy is uniquely tagged and traceable in ECR
      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Build and push server
        run: |
          docker build -t $ECR_REGISTRY/mern-server:$IMAGE_TAG mern-project/server
          docker push $ECR_REGISTRY/mern-server:$IMAGE_TAG

      - name: Build and push client
        run: |
          docker build \
            --build-arg REACT_APP_API_URL="" \
            -t $ECR_REGISTRY/mern-client:$IMAGE_TAG \
            mern-project/client
          docker push $ECR_REGISTRY/mern-client:$IMAGE_TAG

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

      # envsubst replaces ${ECR_REGISTRY}, ${IMAGE_TAG}, ${MONGO_USERNAME}, ${MONGO_PASSWORD}
      - name: Deploy to EKS
        env:
          MONGO_USERNAME: ${{ secrets.MONGO_USERNAME }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
        run: |
          kubectl apply -f k8s/namespace.yaml

          for manifest in k8s/mongodb k8s/server k8s/client; do
            for file in $manifest/*.yaml; do
              envsubst < "$file" | kubectl apply -f -
            done
          done

      - name: Apply alert rules
        run: kubectl apply -f k8s/monitoring/alertrules.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/server -n mern-app --timeout=120s
          kubectl rollout status deployment/client -n mern-app --timeout=120s
